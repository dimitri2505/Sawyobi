name: Deploy to VPS
on:
  push:
    branches: [nika-giorgadze]
  workflow_dispatch:
concurrency:
  group: deploy-warehouse
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 173.212.246.41 >> ~/.ssh/known_hosts
      - name: Rsync to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='.next/cache' --exclude='node_modules' --exclude='.env*' --exclude='.github' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ root@173.212.246.41:/var/www/warehouse/
      - name: Install + restart
        run: |
          ssh -i ~/.ssh/id_ed25519 root@173.212.246.41 'cd /var/www/warehouse && npm ci --omit=dev && pm2 restart warehouse --update-env && pm2 save'
